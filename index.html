<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow-x: hidden; }

    #include-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
    }

    #include-header,
    #include-body,
    #include-footer {
      display: block;
    }
  </style>
</head>

<body>
  <div id="include-loader">Memuat halaman...</div>

  <div id="include-header"></div>
  <div id="include-body"></div>
  <div id="include-footer"></div>

  <script>
    function loadHTML(url, targetId) {
      return fetch(url)
        .then(function(res) {
          if (!res.ok) throw new Error('Gagal memuat: ' + url);
          return res.text();
        })
        .then(function(html) {
          var container = document.getElementById(targetId);
          var template = document.createElement('template');
          template.innerHTML = html;

          // Append non-script nodes first
          var fragment = template.content;
          var scripts = [];

          fragment.querySelectorAll('script').forEach(function(s) {
            scripts.push(s);
          });

          container.appendChild(fragment);

          // Execute scripts in order
          return scripts.reduce(function(chain, oldScript) {
            return chain.then(function() {
              return new Promise(function(resolve) {
                var newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(function(attr) {
                  newScript.setAttribute(attr.name, attr.value);
                });
                if (!oldScript.src) {
                  newScript.textContent = oldScript.textContent;
                  document.head.appendChild(newScript);
                  resolve();
                } else {
                  newScript.onload = resolve;
                  newScript.onerror = resolve;
                  document.head.appendChild(newScript);
                }
              });
            });
          }, Promise.resolve());
        });
    }

    async function init() {
      try {
        await loadHTML('header.html', 'include-header');
        await loadHTML('body.html',   'include-body');
        await loadHTML('footer.html', 'include-footer');
      } catch(e) {
        console.error('Error loading parts:', e);
      } finally {
        document.getElementById('include-loader').style.display = 'none';
      }
    }

    init();
  </script>
</body>

</html>
