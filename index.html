<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow-x: hidden; }

    #include-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
    }

    #include-header,
    #include-body,
    #include-footer {
      display: block;
    }
  </style>

  <!-- CDN Libraries: loaded here so they are ready before any inline scripts in footer.html run -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"
      integrity="sha256-FZsW7H2V5X9TGinSjjwYJ419Xka27I8XPDmWryGlWtw=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide-extension-grid@0.4.1/dist/js/splide-extension-grid.min.js"
      integrity="sha256-l7eXiSofMCMpOBYpj9znCTM46MCE5nIP50pySV6W9lY=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/Flip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lazysizes/5.3.2/lazysizes.min.js"
      integrity="sha512-q583ppKrCRc7N5O0n2nzUiJ+suUv7Et1JGels4bXOaMFQcamPk9HjdUknZuuFjBNs7tsMuadge5k9RzdmO+1GQ=="
      crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"
      integrity="sha512-Zq9o+E00xhhR/7vJ49mxFNJ0KQw1E1TMWkPTxrWcnpfEFDEXgUiwJHIKit93EW/XxE31HSI5GEOW06G6BF1AtA=="
      crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.4/clipboard.min.js"></script>
  <script src="https://themes.viding.co/admin-front-end/js/add_robot_field.js?v=7dd0bb4628f5e4676c57eea64543b857863a66a2"></script>
  <script src="https://themes.viding.co/assets/js/colorpicker.min.js?v=5297bbfece90a1cad607c23bad44eb56948bdef7"></script>
  <script src="https://themes.viding.co/assets/js/gift_registry_script.js?v=12a04e1257f7c2e5bc64835d98e410174e415523"></script>

</head>

<body>
  <div id="include-loader">Memuat halaman...</div>

  <div id="include-header"></div>
  <div id="include-body"></div>
  <div id="include-footer"></div>

  <script>
    function loadHTML(url, targetId) {
      return fetch(url)
        .then(function(res) {
          if (!res.ok) throw new Error('Gagal memuat: ' + url);
          return res.text();
        })
        .then(function(html) {
          var container = document.getElementById(targetId);
          var template = document.createElement('template');
          template.innerHTML = html;

          // Append non-script nodes first
          var fragment = template.content;
          var scripts = [];

          fragment.querySelectorAll('script').forEach(function(s) {
            scripts.push(s);
          });

          container.appendChild(fragment);

          // Execute scripts in order
          return scripts.reduce(function(chain, oldScript) {
            return chain.then(function() {
              return new Promise(function(resolve) {
                var newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(function(attr) {
                  newScript.setAttribute(attr.name, attr.value);
                });
                if (!oldScript.src) {
                  newScript.textContent = oldScript.textContent;
                  document.head.appendChild(newScript);
                  resolve();
                } else {
                  newScript.onload = resolve;
                  newScript.onerror = resolve;
                  document.head.appendChild(newScript);
                }
              });
            });
          }, Promise.resolve());
        });
    }

    async function init() {
      try {
        await loadHTML('header.html', 'include-header');
        await loadHTML('body.html',   'include-body');
        await loadHTML('footer.html', 'include-footer');
      } catch(e) {
        console.error('Error loading parts:', e);
      } finally {
        document.getElementById('include-loader').style.display = 'none';
      }
    }

    init();
  </script>
</body>

</html>
